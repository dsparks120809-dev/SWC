<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SWC</title>

<style>
/* ===== BASE ===== */
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: Arial, sans-serif;
  cursor: none;
  scroll-behavior: smooth;
}

/* ===== CUSTOM CURSOR ===== */
.cursor {
  width: 12px;
  height: 12px;
  border: 1px solid white;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: transform 0.05s ease;
  z-index: 9999;
}

/* ===== NAV ===== */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

nav a {
  color: white;
  text-decoration: none;
  opacity: 0.7;
}

nav a:hover {
  opacity: 1;
}

/* ===== SECTIONS ===== */
section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 80px 20px;
}

h1 {
  font-size: 70px;
  margin: 0;
  letter-spacing: 6px;
}

p {
  opacity: 0.7;
  max-width: 600px;
}

/* ===== BUTTONS ===== */
.btn {
  margin-top: 20px;
  padding: 10px 18px;
  border: 1px solid white;
  color: white;
  text-decoration: none;
  transition: 0.2s;
}

.btn:hover {
  background: white;
  color: black;
}

/* ===== GLITCH ===== */
.glitch {
  position: relative;
}

.glitch::before,
.glitch::after {
  content: "SWC";
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
}

.glitch::before {
  color: red;
  transform: translate(2px);
  opacity: 0.6;
}

.glitch::after {
  color: cyan;
  transform: translate(-2px);
  opacity: 0.6;
}

/* ===== MERCH GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 150px);
  gap: 15px;
}

.box {
  height: 150px;
  border: 1px solid white;
  opacity: 0.7;
}

/* ===== FOOTER ===== */
footer {
  padding: 40px;
  text-align: center;
  opacity: 0.4;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<!-- NAV -->
<nav>
  <a href="#home">home</a>
  <a href="#bio">bio</a>
  <a href="#music">music</a>
  <a href="#merch">merch</a>
</nav>

<!-- HOME -->
<section id="home">
  <h1 class="glitch">SWC</h1>
  <p>slit wrist county / underground collective</p>
  <a class="btn" href="#music">enter</a>
</section>

<!-- BIO -->
<section id="bio">
  <h1>bio</h1>
  <p>
    underground collective influenced by skater culture, alt fashion, distortion rap, and raw street energy.
  </p>
</section>

<!-- MUSIC -->
<section id="music">
  <h1>music</h1>

  <!-- SoundCloud Embed -->
  <iframe width="70%" height="166" scrolling="no" frameborder="no"
  allow="autoplay"
  src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/forss/flickermood">
  </iframe>

  <p>latest drop / preview</p>
</section>

<!-- MERCH -->
<section id="merch">
  <h1>merch</h1>
  <div class="grid">
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
  </div>
</section>

<footer>
  dsparks120809-dev © SWC
</footer>

<!-- CURSOR SCRIPT -->
<script>
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
