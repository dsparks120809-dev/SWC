<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWC</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: Arial, sans-serif;
  cursor: none;
  scroll-behavior: smooth;
}

/* cursor */
.cursor {
  width: 10px;
  height: 10px;
  border: 1px solid white;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 9999;
}

/* nav */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 25px;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  text-decoration: none;
  opacity: 0.6;
}

nav a:hover {
  opacity: 1;
}

/* sections */
section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 60px 20px;
}

h1 {
  font-size: 60px;
  margin: 0;
  letter-spacing: 6px;
}

/* glitch */
.glitch {
  position: relative;
}

.glitch::before,
.glitch::after {
  content: "SWC";
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
}

.glitch::before {
  color: red;
  transform: translate(2px);
  opacity: 0.6;
}

.glitch::after {
  color: cyan;
  transform: translate(-2px);
  opacity: 0.6;
}

/* buttons */
.btn {
  margin-top: 20px;
  padding: 10px 18px;
  border: 1px solid white;
  text-decoration: none;
  color: white;
  transition: 0.2s;
}

.btn:hover {
  background: white;
  color: black;
}

/* merch */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 120px);
  gap: 12px;
}

.box {
  height: 120px;
  border: 1px solid white;
  opacity: 0.5;
}

/* spotify */
iframe {
  margin-top: 20px;
}

/* footer */
footer {
  padding: 30px;
  text-align: center;
  opacity: 0.4;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<nav>
  <a href="#home">home</a>
  <a href="#bio">bio</a>
  <a href="#music">music</a>
  <a href="#merch">merch</a>
</nav>

<!-- HOME -->
<section id="home">
  <h1 class="glitch">SWC</h1>
  <p>slit wrist county / underground collective</p>
  <a class="btn" href="#music">enter</a>
</section>

<!-- BIO -->
<section id="bio">
  <h1>bio</h1>
  <p>
    skater / alt fashion / underground rap collective influenced by distortion, emotion, and street culture.
  </p>
</section>

<!-- MUSIC -->
<section id="music">
  <h1>music</h1>

  <!-- SPOTIFY EMBED -->
  <iframe style="border-radius:12px"
  src="https://open.spotify.com/embed/track/4cOdK2wGLETKBW3PvgPWqT"
  width="70%" height="152"
  frameborder="0"
  allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
  </iframe>

  <p>latest drop</p>
</section>

<!-- MERCH -->
<section id="merch">
  <h1>merch</h1>

  <div class="grid">
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
  </div>
</section>

<footer>
  dsparks120809-dev © SWC
</footer>

<script>
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
