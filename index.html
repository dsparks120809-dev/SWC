<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWC</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: white;
  font-family: Arial, sans-serif;
  cursor: none;
}

/* cursor */
.cursor {
  width: 10px;
  height: 10px;
  border: 1px solid white;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 9999;
}

/* nav */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: center;
  gap: 25px;
  padding: 15px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  text-decoration: none;
  opacity: 0.6;
}
nav a:hover { opacity: 1; }

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.logo {
  font-size: 80px;
  letter-spacing: 10px;
  font-weight: bold;
}

.subtitle {
  opacity: 0.6;
  margin-top: 10px;
}

/* sections */
section {
  padding: 100px 20px;
  text-align: center;
}

/* merch grid */
.merch-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  max-width: 900px;
  margin: auto;
}

.item {
  background: #111;
  border: 1px solid #222;
  overflow: hidden;
  transition: 0.2s;
}

.item:hover {
  transform: scale(1.05);
  border-color: white;
}

.item img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.item p {
  margin: 10px;
  font-size: 14px;
  opacity: 0.8;
}

/* spotify */
iframe {
  margin-top: 20px;
  width: 80%;
}

/* footer */
footer {
  padding: 40px;
  text-align: center;
  opacity: 0.4;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<nav>
  <a href="#home">home</a>
  <a href="#music">music</a>
  <a href="#merch">merch</a>
</nav>

<!-- HERO -->
<div class="hero" id="home">
  <div class="logo">SWC</div>
  <div class="subtitle">skater / alt / underground collective</div>
</div>

<!-- MUSIC -->
<section id="music">
  <h1>music</h1>

  <!-- Spotify playlist (replace link later) -->
  <iframe style="border-radius:12px"
  src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M"
  height="380" frameborder="0"
  allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
  </iframe>
</section>

<!-- MERCH -->
<section id="merch">
  <h1>merch</h1>

  <div class="merch-grid">

    <a class="item" href="#" target="_blank">
      <img src="https://images.unsplash.com/photo-1520975922284-9a5f5d3f8c5b" />
      <p>SWC tee</p>
    </a>

    <a class="item" href="#" target="_blank">
      <img src="https://images.unsplash.com/photo-1520975958228-7c9a7f9b6f2a" />
      <p>hoodie drop</p>
    </a>

    <a class="item" href="#" target="_blank">
      <img src="https://images.unsplash.com/photo-1520975919793-7d6d3c9f8a1b" />
      <p>skater cap</p>
    </a>

  </div>
</section>

<footer>
  SWC © underground label
</footer>

<script>
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
