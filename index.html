<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWC</title>

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* subtle grain */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://grainy-gradients.vercel.app/noise.svg');
      opacity: 0.08;
      pointer-events: none;
    }

    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 64px;
      letter-spacing: 6px;
      margin: 0;
    }

    .tag {
      opacity: 0.6;
      margin-top: 10px;
      letter-spacing: 2px;
    }

    .links {
      margin-top: 40px;
      display: flex;
      gap: 20px;
    }

    a {
      color: white;
      text-decoration: none;
      border: 1px solid white;
      padding: 10px 18px;
      transition: 0.2s;
    }

    a:hover {
      background: white;
      color: black;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      opacity: 0.4;
      font-size: 12px;
    }

    /* glitch effect */
    h1 {
      position: relative;
    }

    h1::before,
    h1::after {
      content: "SWC";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      overflow: hidden;
    }

    h1::before {
      color: red;
      transform: translate(2px, 0);
      opacity: 0.6;
      animation: glitch 2s infinite;
    }

    h1::after {
      color: cyan;
      transform: translate(-2px, 0);
      opacity: 0.6;
      animation: glitch 1.5s infinite;
    }

    @keyframes glitch {
      0% { clip-path: inset(0 0 90% 0); }
      20% { clip-path: inset(10% 0 70% 0); }
      40% { clip-path: inset(50% 0 20% 0); }
      60% { clip-path: inset(30% 0 40% 0); }
      80% { clip-path: inset(80% 0 5% 0); }
      100% { clip-path: inset(0 0 90% 0); }
    }
  </style>
</head>

<body>

  <div class="center">
    <h1>SWC</h1>
    <div class="tag">slit wrist county / underground collective</div>

    <div class="links">
      <a href="#">music</a>
      <a href="#">merch</a>
      <a href="#">instagram</a>
      <a href="#">contact</a>
    </div>

    <div class="footer">
      dsparks120809-dev ©
    </div>
  </div>

</body>
</html>
